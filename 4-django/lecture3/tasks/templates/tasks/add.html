{% extends "tasks/layout.html" %}

{% block body %}
    <h1>Add Task</h1>
    <form action="{% url 'tasks:add' %}" method="post">
        {% comment %} csrf for security {% endcomment %}
        {% csrf_token %}
        {{ form }}
        {% comment %} <input type="text" name="task"> {% endcomment %}
        <input type="submit">
    </form>
    {% comment %} Means the Tasks App get the url index {% endcomment %}
    <a href="{% url 'tasks:index' %}">View Tasks</a>
{% endblock %}
