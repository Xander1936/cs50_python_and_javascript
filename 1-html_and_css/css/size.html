<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Size</title>
    <style>
        div {
            align-content: center;
            justify-content: center;
            background-color: grey;
            width: 200px;
            height: 200px;
            text-align: center;
            color: violet;
            font: larger "Calibri";
            font-weight: bolder;
            padding: 20px;
            margin: 20px;
            border: 3px solid black;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div>
        Hello, world!
    </div>
</body>
</html>
