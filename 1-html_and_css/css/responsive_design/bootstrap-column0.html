<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Design</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- row is the parent and -- div class="col-3" -- is the child's element  -->
    <style>
        .row > div {
            margin: 20px;
            padding: 20px;
            background-color: teal;
            border: 2px solid black;
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Bootstrap divide every row into 12 Units Columns -->
        <div class="row">
            <div class="col-3">This is a section.</div>
            <div class="col-3">This is another section.</div>
            <div class="col-3">This is a third section.</div>
            <div class="col-3">This is a fourth section.</div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
